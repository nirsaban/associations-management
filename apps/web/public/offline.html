<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אין חיבור לאינטרנט - ניהול עמותות</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #004650 0%, #006876 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      direction: rtl;
    }

    .container {
      background: white;
      border-radius: 16px;
      padding: 48px 32px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #f0f0f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    h1 {
      font-size: 24px;
      color: #004650;
      margin-bottom: 16px;
      font-weight: 600;
    }

    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
      font-size: 16px;
    }

    button {
      background: #004650;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }

    button:hover {
      background: #006876;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      📡
    </div>
    <h1>אין חיבור לאינטרנט</h1>
    <p>נראה שאינך מחובר לאינטרנט. אנא בדוק את החיבור שלך ונסה שוב.</p>
    <button onclick="window.location.reload()">נסה שוב</button>
  </div>
</body>
</html>
