name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/amutot-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/amutot-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # First attempt — built layers stay in the registry cache so the retries
      # below only need to re-push the manifest if GHCR 502s on us.
      - name: Build and push backend (attempt 1)
        id: backend_push_1
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          provenance: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push backend (attempt 2)
        if: steps.backend_push_1.outcome == 'failure'
        id: backend_push_2
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          provenance: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push backend (attempt 3)
        if: steps.backend_push_1.outcome == 'failure' && steps.backend_push_2.outcome == 'failure'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          provenance: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend (attempt 1)
        id: frontend_push_1
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          provenance: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend (attempt 2)
        if: steps.frontend_push_1.outcome == 'failure'
        id: frontend_push_2
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          provenance: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend (attempt 3)
        if: steps.frontend_push_1.outcome == 'failure' && steps.frontend_push_2.outcome == 'failure'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          provenance: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null

      # Common SSH/SCP options:
      # - ConnectTimeout=20      → fail fast on dead servers (default is ~120s)
      # - ServerAliveInterval=15 → don't leave half-open sessions on the server
      # - ServerAliveCountMax=4  → cap idle hang at ~60s
      # - ConnectionAttempts=1   → don't retry inside ssh; we retry in shell
      # - BatchMode=yes          → never prompt for password
      # NOTE: env vars are intentionally NOT prefixed with `secrets.` here so
      # the workflow YAML stays single-source for the SSH knobs.
      - name: SSH pre-flight (fail fast if server unreachable / sshd wedged)
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          set -euo pipefail
          echo "Probing TCP/22 on $DEPLOY_SSH_HOST..."
          if ! timeout 10 bash -c "</dev/tcp/$DEPLOY_SSH_HOST/22"; then
            echo "::error::TCP/22 unreachable on $DEPLOY_SSH_HOST — check VPS / network / firewall"
            exit 1
          fi
          echo "Reading SSH banner (5s budget) — detects wedged sshd..."
          BANNER=$(timeout 5 bash -c "exec 3<>/dev/tcp/$DEPLOY_SSH_HOST/22; head -c 64 <&3" || true)
          if [[ -z "$BANNER" ]]; then
            echo "::error::TCP/22 accepts but sshd never sent its protocol banner."
            echo "::error::sshd is wedged on $DEPLOY_SSH_HOST. Reboot the VPS or restart ssh via the provider console."
            exit 1
          fi
          echo "SSH banner: $BANNER"

      - name: Copy compose and nginx config to server
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i $HOME/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ConnectionAttempts=1 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4"
          retry() {
            local n=1 max=3 delay=10
            while true; do
              if "$@"; then return 0; fi
              if (( n >= max )); then
                echo "::error::Command failed after $n attempts: $*"
                return 1
              fi
              echo "Attempt $n failed — retrying in ${delay}s..."
              sleep "$delay"
              n=$((n + 1)); delay=$((delay * 3))
            done
          }
          retry scp $SSH_OPTS docker-compose.prod.yml "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST:/opt/miltech-association/docker-compose.prod.yml"
          retry scp $SSH_OPTS docker/nginx.conf "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST:/opt/miltech-association/nginx.conf"

      - name: Deploy on server
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i $HOME/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ConnectionAttempts=1 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4"
          ssh $SSH_OPTS "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
            "GHCR_TOKEN='$GHCR_TOKEN' REPO_OWNER='$REPO_OWNER' bash -s" << 'ENDSSH'
            set -e
            cd /opt/miltech-association
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$REPO_OWNER" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            echo "Waiting for backend to be healthy..."
            sleep 15
            docker compose -f docker-compose.prod.yml exec -T backend npx prisma migrate deploy --schema=./prisma/schema.prisma || true
            docker image prune -f --filter "label!=com.docker.compose.project=miluim" --filter "label!=com.docker.compose.project=evolution-api"
          ENDSSH

      - name: Health check
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          set -euo pipefail
          sleep 20
          SSH_OPTS="-i $HOME/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ConnectionAttempts=1 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4"
          ssh $SSH_OPTS "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" bash -s <<'ENDSSH'
            set -e
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:3100/health)
            echo "Health check status: $STATUS"
            if [ "$STATUS" != "200" ]; then
              cd /opt/miltech-association && docker compose -f docker-compose.prod.yml logs --tail=30
              exit 1
            fi
            echo "Health check passed!"
          ENDSSH
