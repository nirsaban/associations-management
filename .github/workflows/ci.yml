  # ============================================================================
  # Status: Final check that all required jobs passed
  # ============================================================================
  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build]
    if: always()

    steps:
      - name: Check CI Status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.typecheck.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "::error::CI Pipeline failed"
            exit 1
          else
            echo "::notice::CI Pipeline passed successfully"
          fi

      - name: Comment PR Status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('CI Pipeline')
            );
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const body = `${status} CI Pipeline: ` +
              `[Lint](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) • ` +
              `[TypeCheck](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) • ` +
              `[Test](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) • ` +
              `[Build](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
