<body class="text-on-surface bg-surface min-h-screen flex flex-col items-center justify-center p-6">
<!-- Top Branding Anchor -->
<div class="mb-12 text-center w-full max-w-sm">
<div class="inline-flex items-center justify-center p-4 bg-primary rounded-xl mb-6 shadow-xl shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="temple_buddhist">temple_buddhist</span>
</div>
<h1 class="font-headline font-bold text-2xl tracking-tight text-primary">Nachalat David Platform</h1>
<p class="font-body text-on-surface-variant mt-2 text-sm">ברוכים הבאים לבית הקהילתי הדיגיטלי שלנו</p>
</div>
<!-- Login Container -->
<div class="w-full max-w-sm space-y-8">
<!-- Welcome Message -->
<div class="text-right">
<h2 class="text-xl font-bold font-headline text-on-surface mb-1">כניסה למערכת</h2>
<p class="text-on-surface-variant text-sm">הזינו מספר טלפון כדי לקבל קוד גישה</p>
</div>
<!-- Phone Number State (Default/Error) -->
<div class="space-y-4">
<div class="relative surface-container-low p-4 rounded-xl editorial-underline bg-error-container/20 border-error">
<label class="block text-xs font-bold text-on-surface-variant mb-1">מספר טלפון</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="call">call</span>
<input class="bg-transparent border-none focus:ring-0 w-full p-0 text-lg font-bold tracking-widest text-on-surface placeholder:text-outline-variant" placeholder="05X-XXXXXXX" type="tel" value="050-1234567"/>
</div>
</div>
<!-- Error Message: Contextual -->
<div class="flex items-start gap-2 text-error px-2">
<span class="material-symbols-outlined text-sm mt-0.5" data-icon="error">error</span>
<p class="text-sm font-medium leading-tight">Phone number not found. Users are pre-imported by admin.</p>
</div>
</div>
<!-- OTP Verification State (Visualized below for logic demonstration) -->
<div class="space-y-6 pt-4">
<div class="text-right">
<h2 class="text-lg font-bold font-headline text-on-surface mb-1">אימות קוד</h2>
<p class="text-on-surface-variant text-sm">שלחנו קוד לנייד שלכם. אנא הזינו אותו כאן:</p>
</div>
<div class="flex justify-between items-center gap-2" dir="ltr">
<input class="otp-input rounded-t-lg" maxlength="1" placeholder="·" type="text"/>
<input class="otp-input rounded-t-lg" maxlength="1" placeholder="·" type="text"/>
<input class="otp-input rounded-t-lg" maxlength="1" placeholder="·" type="text"/>
<input class="otp-input rounded-t-lg" maxlength="1" placeholder="·" type="text"/>
<input class="otp-input rounded-t-lg" maxlength="1" placeholder="·" type="text"/>
<input class="otp-input rounded-t-lg" maxlength="1" placeholder="·" type="text"/>
</div>
<button class="text-primary font-bold text-sm hover:underline w-full text-center">
                לא קיבלתם קוד? שלחו שוב
            </button>
</div>
<!-- Primary Actions -->
<div class="pt-4">
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg rounded-xl shadow-lg shadow-primary/20 active:scale-95 transition-transform flex items-center justify-center gap-2">
                המשך
                <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<!-- Support Info -->
<div class="mt-12 text-center p-6 bg-surface-container-low rounded-2xl border border-outline-variant/10">
<p class="text-on-surface-variant text-xs mb-3">צריכים עזרה בכניסה?</p>
<div class="flex justify-center gap-4">
<button class="flex items-center gap-1.5 text-secondary font-semibold text-sm">
<span class="material-symbols-outlined text-base" data-icon="support_agent">support_agent</span>
                    תמיכה טכנית
                </button>
<div class="w-px h-4 bg-outline-variant/30"></div>
<button class="flex items-center gap-1.5 text-secondary font-semibold text-sm">
<span class="material-symbols-outlined text-base" data-icon="help">help</span>
                    מידע נוסף
