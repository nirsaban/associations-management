<!DOCTYPE html>

<html class="light" dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed": "#acedfb",
                    "surface-container-highest": "#e1e3e3",
                    "secondary-fixed-dim": "#abd0a8",
                    "error": "#ba1a1a",
                    "outline": "#6f7979",
                    "on-background": "#191c1d",
                    "tertiary-container": "#754e00",
                    "on-primary-container": "#95d6e4",
                    "on-error-container": "#93000a",
                    "surface-container-lowest": "#ffffff",
                    "surface-tint": "#206773",
                    "on-tertiary-fixed-variant": "#614000",
                    "on-secondary-fixed": "#012108",
                    "on-surface-variant": "#3f4949",
                    "on-primary": "#ffffff",
                    "surface-container-low": "#f2f4f4",
                    "tertiary": "#563900",
                    "on-error": "#ffffff",
                    "on-primary-fixed-variant": "#004e59",
                    "primary-fixed-dim": "#90d1df",
                    "surface-container-high": "#e6e8e8",
                    "on-surface": "#191c1d",
                    "secondary": "#456646",
                    "secondary-container": "#c6edc3",
                    "inverse-on-surface": "#eff1f1",
                    "error-container": "#ffdad6",
                    "on-secondary": "#ffffff",
                    "on-primary-fixed": "#001f25",
                    "outline-variant": "#bec8c9",
                    "primary": "#004650",
                    "on-secondary-fixed-variant": "#2d4e30",
                    "on-tertiary": "#ffffff",
                    "surface-variant": "#e1e3e3",
                    "on-secondary-container": "#4b6c4b",
                    "surface-dim": "#d8dada",
                    "inverse-surface": "#2e3131",
                    "secondary-fixed": "#c6edc3",
                    "background": "#f8fafa",
                    "surface-container": "#eceeee",
                    "tertiary-fixed": "#ffddaf",
                    "on-tertiary-fixed": "#281800",
                    "inverse-primary": "#90d1df",
                    "primary-container": "#135f6b",
                    "surface": "#f8fafa",
                    "surface-bright": "#f8fafa",
                    "on-tertiary-container": "#ffc05b",
                    "tertiary-fixed-dim": "#ffba44"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Be Vietnam Pro"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafa;
        }
        .headline-font {
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        /* Hide scrollbars for a clean mobile look */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- Step 1: Profile Information -->
<main class="w-full max-w-md px-6 pt-12 pb-24 flex flex-col gap-8 animate-fade-in">
<!-- Header Section -->
<header class="flex flex-col gap-2">
<div class="w-12 h-1 bg-primary rounded-full mb-4"></div>
<h1 class="headline-font text-3xl font-extrabold tracking-tight text-primary">נעים להכיר</h1>
<p class="text-on-surface-variant text-lg leading-relaxed">אנחנו רק צריכים עוד כמה פרטים קטנים כדי להתחיל.</p>
</header>
<!-- Form Section -->
<div class="flex flex-col gap-6">
<!-- Full Name Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-on-surface-variant px-1" for="full-name">שם מלא</label>
<div class="bg-surface-container-low border-b-2 border-primary-container px-4 py-4 rounded-t-xl transition-all focus-within:bg-surface-container">
<input class="w-full bg-transparent border-none focus:ring-0 text-lg p-0 placeholder:text-outline-variant" id="full-name" placeholder="לדוגמה: ישראל ישראלי" type="text"/>
</div>
</div>
<!-- Phone Field (Read Only) -->
<div class="flex flex-col gap-2 opacity-80">
<label class="text-sm font-semibold text-on-surface-variant px-1" for="phone">מספר טלפון</label>
<div class="bg-surface-container-highest/50 border-b-2 border-outline-variant px-4 py-4 rounded-t-xl flex justify-between items-center cursor-not-allowed">
<span class="text-lg text-on-surface">054-1234567</span>
<span class="material-symbols-outlined text-outline-variant" data-icon="lock">lock</span>
</div>
<p class="text-xs text-outline-variant px-1">לא ניתן לשנות את מספר הטלפון בשלב זה</p>
</div>
</div>
<!-- Group Selection Section -->
<section class="flex flex-col gap-4">
<h2 class="text-lg font-bold text-primary mt-4">בחירת קהילה</h2>
<div class="flex flex-col gap-3">
<!-- Group Option 1 -->
<button class="flex items-center gap-4 p-5 bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.03)] border-2 border-transparent hover:border-primary-container transition-all text-right group">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined" data-icon="group">group</span>
</div>
<div class="flex-1">
<h3 class="font-bold text-on-surface">קהילת אחוזה</h3>
<p class="text-sm text-on-surface-variant">חיפה, ישראל</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-primary">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
</button>
<!-- Group Option 2 -->
<button class="flex items-center gap-4 p-5 bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.03)] border-2 border-transparent hover:border-primary-container transition-all text-right group">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined" data-icon="apartment">apartment</span>
</div>
<div class="flex-1">
<h3 class="font-bold text-on-surface">שכונת שפירא</h3>
<p class="text-sm text-on-surface-variant">תל אביב יפו</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-primary">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
</button>
<!-- "Not part of a group" Option -->
<button class="flex items-center gap-4 p-5 bg-surface-container-low/50 rounded-xl border-2 border-dashed border-outline-variant hover:border-primary-container transition-all text-right group mt-2">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="person_off">person_off</span>
</div>
<div class="flex-1">
<h3 class="font-bold text-on-surface-variant">אני לא חלק מקהילה</h3>
<p class="text-sm text-on-surface-variant">המשך כמשתמש עצמאי</p>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="arrow_back_ios">arrow_back_ios</span>
</button>
</div>
</section>
<!-- CTA Fixed at bottom on mobile -->
<footer class="fixed bottom-0 left-0 w-full p-6 bg-surface/80 backdrop-blur-md z-10 flex flex-col gap-4">
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2">
                סיום הרשמה
                <span class="material-symbols-outlined" data-icon="done_all">done_all</span>
</button>
</footer>
</main>
<!-- Success Overlay (Hidden by default, shown here as a separate state concept) -->
<!-- To see this, we'll keep it absolute at the bottom for demo purposes or comment it out. 
         Following "Design for specific intent" instructions, I'll place a success toast instead. -->
<!-- Success Feedback Overlay (Visual Mockup) -->
<div class="hidden fixed inset-0 z-[60] bg-surface flex flex-col items-center justify-center p-8 text-center">
<div class="w-24 h-24 bg-secondary-container rounded-full flex items-center justify-center mb-8">
<span class="material-symbols-outlined text-5xl text-on-secondary-container" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="headline-font text-3xl font-extrabold text-primary mb-4">ברוכים הבאים!</h2>
<p class="text-on-surface-variant text-lg">הפרופיל שלך הוגדר בהצלחה. אנחנו מעבירים אותך לדף הבית.</p>
<!-- Decorative subtle element -->
<div class="absolute bottom-20 w-full flex justify-center opacity-10">
<img class="w-64 h-64 object-contain" data-alt="abstract flowing lines in soft teal and amber tones representing digital growth and community connection" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbYKMAbZne76z07GdCFo5A332r79aQC_A0DI9KoScqa8OwV6xA1-QhmUHU-c35JtppTFc3Geel5Jr3xqj8Tb15FKoufVzh06iARasjyEVPeoI5QS9dp2JUYpZWtI2ILxj2hMeyoDnSKdqEz_szXZ-TYhI2FRuiXrwii3tRJoXPBfDfqfyl4Pgg6jJrt3EZqb_Ul0QvAZxk6uGtAYZUe92MjkvRtcZgUK91MgcojbeU_geZkUGUF7OrG61xf5Ln41KFJZ5_HKsOFgg"/>
</div>
</div>
<!-- Small "Toast" feedback alternative that is visible -->
<div class="fixed top-8 left-1/2 -translate-x-1/2 bg-inverse-surface text-inverse-on-surface px-6 py-3 rounded-full flex items-center gap-3 shadow-xl z-50">
<span class="material-symbols-outlined text-secondary-fixed" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-sm font-medium">הפרטים נשמרו בהצלחה</span>
</div>
</body></html>
